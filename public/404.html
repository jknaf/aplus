<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://www.aplusurbandesign.com/" />

    <title>404 – Seite nicht gefunden | A+ Urban Design</title>
    <meta name="description" content="Die angeforderte Seite existiert nicht. Zurück zur Startseite von A+ Urban Design – Skatepark-Hersteller aus Stuttgart." />

    <link rel="icon" type="image/svg+xml" href="/aplus-icon.svg?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />

    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
    <link href="https://fonts.bunny.net/css?family=inter:400,600,900|plus-jakarta-sans:700,800&display=swap" rel="stylesheet">

    <style>
      :root {
        --brand-bg: #f5f1ea;
        --brand-dark: #2c3530;
        --brand-orange: #e85a2c;
        --brand-muted: #6b7065;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: var(--brand-bg);
        color: var(--brand-dark);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      header {
        padding: 1.5rem 2rem;
        border-bottom: 1px solid rgba(44, 53, 48, 0.08);
      }
      header img { height: 40px; display: block; }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 3rem 1.5rem;
      }
      .code {
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        font-size: clamp(6rem, 18vw, 10rem);
        font-weight: 800;
        line-height: 1;
        color: var(--brand-orange);
        letter-spacing: -0.05em;
        margin-bottom: 1rem;
      }
      h1 {
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        margin-bottom: 1.25rem;
      }
      p {
        max-width: 28rem;
        color: var(--brand-muted);
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--brand-orange);
        color: #fff;
        text-decoration: none;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-size: 0.8125rem;
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        transition: background 0.2s ease;
      }
      a.btn:hover { background: var(--brand-dark); }
      footer {
        padding: 1.5rem 2rem;
        border-top: 1px solid rgba(44, 53, 48, 0.08);
        color: var(--brand-muted);
        font-size: 0.875rem;
        text-align: center;
      }
      footer a { color: var(--brand-muted); text-decoration: none; }
      footer a:hover { color: var(--brand-dark); }
    </style>
  </head>
  <body>
    <header>
      <a href="/"><img src="/aplus-logo.svg" alt="A+ Urban Design" /></a>
    </header>

    <main>
      <div class="code">404</div>
      <h1>Diese Seite existiert nicht.</h1>
      <p>Möglicherweise wurde sie verschoben oder gelöscht. Überprüfen Sie die URL oder kehren Sie zur Startseite zurück.</p>
      <a class="btn" href="/">Zur Startseite</a>
    </main>

    <footer>
      <a href="/impressum">Impressum</a> &nbsp;·&nbsp; <a href="/datenschutz">Datenschutz</a> &nbsp;·&nbsp; <a href="/kontakt">Kontakt</a>
    </footer>
  </body>
</html>
